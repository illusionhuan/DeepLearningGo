<!DOCTYPE HTML>

<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Board</title>
  <style>
  body {
    font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
    text-align: center;
  }
  .loader,
  .loader:before,
  .loader:after {
      border-radius: 50%;
      width: 2.5em;
      height: 2.5em;
      -webkit-animation-fill-mode: both;
      animation-fill-mode: both;
      -webkit-animation: load7 1.8s infinite ease-in-out;
      animation: load7 1.8s infinite ease-in-out;
  }
  .loader {
      color: #ccc;
      font-size: 10px;
      margin: 0px auto;
      position: relative;
      text-indent: -9999em;
      -webkit-transform: translateZ(0);
      -ms-transform: translateZ(0);
      transform: translateZ(0);
      -webkit-animation-delay: -0.16s;
      animation-delay: -0.16s;
  }
  .loader:before,
  .loader:after {
      content: '';
      position: absolute;
      top: 0;
  }
  .loader:before {
      left: -3.5em;
      -webkit-animation-delay: -0.32s;
      animation-delay: -0.32s;
  }
  .loader:after {
        left: 3.5em;
  }
  @-webkit-keyframes load7 {
      0%, 80%, 100% {
          box-shadow: 0 2.5em 0 -1.3em;
      }
      40% {
          box-shadow: 0 2.5em 0 0;
      }
  }
  @keyframes load7 {
      0%, 80%, 100% {
          box-shadow: 0 2.5em 0 -1.3em;
      }
      40% {
          box-shadow: 0 2.5em 0 0;
      }
  }
  </style>
</head>
<body>

<div style="text-align: center; font-size: 18px;">Alphago人机对弈平台</div>
<div><a href="#" onclick="resetGame(event);" style="font-size: 15px; margin-right: 20px;">New-Game</a>
    <button onclick="selfPlay()" style="font-size: 15px">AI-PLAY(运行20步)</button>
    <button onclick="saveSGF()" style="font-size: 15px">保存棋谱</button></div>

<div>
    <input type="file" id="myFile" accept=".sgf" style="font-size: 15px;">
    <button onclick="uploadFile()" style="font-size: 15px">上传</button>
    <button onclick="loadSGF()" style="font-size: 15px">加载棋谱</button>
</div>
<div id="board"></div>
<div>
    <div id="status">Black to play</div>
    <div id="diagnostics"></div>
    <div id="spinner" style="display: none" class="loader"></div>
</div>
<script src="static/iframeSizer.contentWindow.min.js"></script>


<script type="text/javascript" src="static/jgoboard-latest.js"></script>
<script type="text/javascript" src="static/large/board.js"></script>
<script type="text/javascript">
var BOARD_SIZE = 19;
var jrecord = new JGO.Record(BOARD_SIZE);
var jboard = jrecord.jboard;
var jsetup = new JGO.Setup(jboard, JGO.BOARD.largeWalnut);
var player = JGO.BLACK;
var ko = false, lastMove = false;
var lastHover = false, lastX = -1, lastY = -1;
var record = [];
var colnames = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'J', 'K', 'L', 'M', 'N', 'O', 'P', 'Q', 'R', 'S', 'T'];
var waitingForBot = false;
var illegal_move = false;

function resetGame(ev) {
    jrecord.jboard.clear();
    jrecord.root = jrecord.current = null;
    jrecord.info = {};
    record = [];
    waitingForBot = false;
    ev.preventDefault();
}

function coordsToString(point) {
    var row = (BOARD_SIZE - 1) - point.j;
    var col = point.i;
    return colnames[col] + ((row + 1).toString());
}

function stringToCoords(move_string) {
    var colStr = move_string.substring(0, 1);
    var rowStr = move_string.substring(1);
    var col = colnames.indexOf(colStr);
    var row = BOARD_SIZE - parseInt(rowStr, 10);
    return new JGO.Coordinate(col, row);
}

function applyMove(player, coord) {
    var play = jboard.playMove(coord, player, ko);

    if (play.success) {
        record.push(coordsToString(coord));
        node = jrecord.createNode(true);
        node.info.captures[player] += play.captures.length;
        node.setType(coord, player); // play stone
        node.setType(play.captures, JGO.CLEAR);

        if (lastMove) {
            node.setMark(lastMove, JGO.MARK.NONE);
        }
        if (ko) {
            node.setMark(ko, JGO.MARK.NONE);
        }
        node.setMark(coord, JGO.MARK.CIRCLE);
        lastMove = coord;

      if(play.ko)
        node.setMark(play.ko, JGO.MARK.CIRCLE);
      ko = play.ko;
      illegal_move = false;
    } else {
       alert('违规落子: 不能重复落子');
       illegal_move = true;
    };
}

function waitForBot() {
    console.log('Waiting for bot...');
    document.getElementById('status').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    waitingForBot = true;
}

function stopWaiting(botmove) {
    var text = 'Bot plays ' + botmove;
    if (botmove == 'pass') {
        text = 'Bot passes';
    } else if (botmove == 'resign') {
        text = 'Bot resigns';
    }
    document.getElementById('status').innerHTML = text;
    document.getElementById('status').style.display = 'block';
    document.getElementById('spinner').style.display = 'none';
    waitingForBot = false;
}

function updateDiagnostics(diag) {
    if (diag) {
        document.getElementById('diagnostics').innerHTML =
            'Value: ' + diag.value.toFixed(3);
    } else {
        console.log('clear');
        document.getElementById('diagnostics').innerHtml = '';
    }
}

jsetup.setOptions({stars: {points:5}});
jsetup.create('board', function(canvas) {
  canvas.addListener('click', function(coord, ev) {
    if (waitingForBot) {
        return;
    }
    var opponent = (player == JGO.BLACK) ? JGO.WHITE : JGO.BLACK;

    if(ev.shiftKey) {
      if(jboard.getMark(coord) == JGO.MARK.NONE)
        jboard.setMark(coord, JGO.MARK.SELECTED);
      else
        jboard.setMark(coord, JGO.MARK.NONE);

      return;
    }

    if(lastHover)
      jboard.setType(new JGO.Coordinate(lastX, lastY), JGO.CLEAR);

    lastHover = false;

    console.log('Human', coordsToString(coord));
    applyMove(JGO.BLACK, coord);
    if (illegal_move){
        return;
    }
    waitForBot();
    fetch('/select-move/alphagoBot', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({'board_size': BOARD_SIZE, 'moves': record}),
    }).then(function(response) {
        if (!waitingForBot) {
            console.log('Got response but not waiting for one');
            return;
        }
        response.json().then(function(data) {
            if (data.bot_move == 'pass' || data.bot_move == 'resign') {
                record.push(data.bot_move);
            } else {
                var botCoord = stringToCoords(data.bot_move);
                applyMove(JGO.WHITE, botCoord);
            }
            stopWaiting(data.bot_move);
            updateDiagnostics(data.diagnostics);
        });
    }).catch(function(error) {
        console.log(error);
        stopWaiting(data.bot_move);
    });
  });

  canvas.addListener('mousemove', function(coord, ev) {
    if(coord.i == -1 || coord.j == -1 || (coord.i == lastX && coord.j == lastY))
      return;

    if(lastHover) // clear previous hover if there was one
      jboard.setType(new JGO.Coordinate(lastX, lastY), JGO.CLEAR);

    lastX = coord.i;
    lastY = coord.j;

    if(jboard.getType(coord) == JGO.CLEAR && jboard.getMark(coord) == JGO.MARK.NONE) {
      jboard.setType(coord, player == JGO.WHITE ? JGO.DIM_WHITE : JGO.DIM_BLACK);
      lastHover = true;
    } else
      lastHover = false;
  });

  canvas.addListener('mouseout', function(ev) {
    if(lastHover)
      jboard.setType(new JGO.Coordinate(lastX, lastY), JGO.CLEAR);

    lastHover = false;
  });
});

function saveSGF() {
    alert('正在保存棋谱');
    fetch('/saveSGF', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({'board_size': BOARD_SIZE, 'moves': record}),
    }).then(function(response) {
        response.json().then(function(data) {
                setTimeout(function() {
            alert('棋谱保存成功！');
                }, 1000);
        });
    }).catch(function(error) {
        console.log(error);
    });
}

function uploadFile() {
  var fileInput = document.getElementById('myFile');
  var file = fileInput.files[0];
  var formData = new FormData();

  formData.append('file', file);

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/upload', true);

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      var percentComplete = (e.loaded / e.total) * 100;
      console.log(percentComplete + '% 上传完成');
    }
  };

  xhr.onload = function() {
    if (this.status === 200) {
      alert('上传成功');
      console.log('上传成功');
    } else {
      alert('上传失败，请重新上传');
      console.log('上传失败');
    }
  };

  xhr.send(formData);
}
function loadSGF() {
    alert('正在加载棋谱。。。');
    fetch('/loadSGF', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({'board_size': BOARD_SIZE, 'moves': record}),
    }).then(function(response) {
        response.json().then(function(data) {
                move_list = data.list;
                if (move_list.length % 2 != 0) {
                    move_list.pop();
                }
                for (let i = 0; i < move_list.length; i++) {
                    (function(index, moveString) {
                        setTimeout(function() {
                            var botCoord = stringToCoords(moveString);
                            if (index % 2 == 0) {
                                applyMove(JGO.BLACK, botCoord);
                                text = "Player Black plays at: " + moveString;
                                console.log(text);
                                document.getElementById('status').innerHTML = text;
                            } else {
                                 applyMove(JGO.WHITE, botCoord);
                                 text = "Player White plays at: " + moveString;
                                 console.log(text);
                                 document.getElementById('status').innerHTML = text;
                            }
                         }, i * 3000);
                    })(i, move_list[i]);
                }
        });
    }).catch(function(error) {
        console.log(error);
    });
}
function selfPlay() {
    alert('正在自我对弈，请勿点击棋盘及其它按钮');
    fetch('/selfPlay', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({'board_size': BOARD_SIZE, 'moves': record}),
    }).then(function(response) {
        response.json().then(function(data) {
                move_list = data.list;
                alert('运行完成，正在加载棋谱');
                for (let i = 0; i < move_list.length; i++) {
                    (function(index, moveString) {
                        setTimeout(function() {
                            var botCoord = stringToCoords(moveString);
                            if (index % 2 == 0) {
                                applyMove(JGO.BLACK, botCoord);
                                text = "Player RandomBot plays at: " + moveString;
                                console.log(text);
                                document.getElementById('status').innerHTML = text;
                            } else {
                                 applyMove(JGO.WHITE, botCoord);
                                 text = "Player AlphaGoBot plays at: " + moveString;
                                 console.log(text);
                                 document.getElementById('status').innerHTML = text;
                            }
                         }, i * 3000);
                    })(i, move_list[i]);
                }
        });
    }).catch(function(error) {
        console.log(error);
    });
}
</script>

</body>
</html>
